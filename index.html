<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="webpage">
    <div class="box">
      <img class="image" src="images/image-qr-code.png" alt="photo">
      <div class="content">
        <p class="title">Updated and better looking QR Code</p>
        <p class="qr-instruction">Here is my new and improved QR Code! Just scan to enter magical places, oooooh spooky</p>
      </div>
    </div>
    <div class="footer">
      <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.</p> 
      <p>Coded by <a href="#">Tony Stapley</a>.</p>
    </div>
  </div>
</body>
</html>
